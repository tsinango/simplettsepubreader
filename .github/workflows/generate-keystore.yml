name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          mkdir -p signing

          STORE_PASS=$(openssl rand -base64 24)
          KEY_PASS=$(openssl rand -base64 24)
          KEY_ALIAS=tts-reader

          keytool -genkeypair \
            -v \
            -keystore signing/tts-reader.jks \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "$KEY_ALIAS" \
            -dname "CN=tts-reader, OU=dev, O=personal, L=city, ST=state, C=US"

          base64 -w 0 signing/tts-reader.jks > tts-reader-keystore-base64.txt

          cat > signing-info.txt <<EOF
          TTS_READER_KEYSTORE_PASSWORD=$STORE_PASS
          TTS_READER_KEY_ALIAS=$KEY_ALIAS
          TTS_READER_KEY_PASSWORD=$KEY_PASS
          EOF

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: tts-reader-signing-files
          path: |
            signing/tts-reader.jks
            tts-reader-keystore-base64.txt
            signing-info.txt
